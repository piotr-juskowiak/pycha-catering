  <script>
    (() => {
      const frames = Array.from(document.querySelectorAll(".culini-import-frame"));
      if (!frames.length) return;
      let ticking = false;

      const sendFrameMetrics = () => {
        frames.forEach((frame) => {
          if (!frame.contentWindow) return;
          const rect = frame.getBoundingClientRect();
          frame.contentWindow.postMessage({
            type: "culini-parent-scroll",
            frameTop: rect.top,
            viewportHeight: window.innerHeight
          }, "*");
        });
        ticking = false;
      };

      const queueFrameMetrics = () => {
        if (ticking) return;
        ticking = true;
        window.requestAnimationFrame(sendFrameMetrics);
      };

      window.addEventListener("message", (event) => {
        const frame = frames.find((candidate) => candidate.contentWindow === event.source);
        if (!frame) return;
        if (!event.data || event.data.type !== "culini-import-height") return;
            const nextHeight = Math.ceil(Number(event.data.height) || 0);
            if (nextHeight < 240) return;
            frame.style.height = nextHeight + "px";
        queueFrameMetrics();
      });

      frames.forEach((frame) => frame.addEventListener("load", queueFrameMetrics));
      window.addEventListener("scroll", queueFrameMetrics, { passive: true });
      window.addEventListener("resize", queueFrameMetrics);
    })();
  </script>

<script>
  (() => {
    const hero = document.querySelector(".pycha-footer__hero");

    if (!hero) return;

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (prefersReducedMotion) {
      hero.style.setProperty("--pycha-reveal", "0%");
      hero.style.setProperty("--pycha-parallax-y", "0px");
      return;
    }

    let ticking = false;

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    const updateParallax = () => {
      const rect = hero.getBoundingClientRect();
      const windowHeight = window.innerHeight;

      const absoluteTop = rect.top + window.pageYOffset;
      const scrollStart = absoluteTop - windowHeight;
      const scrollEnd = document.documentElement.scrollHeight - windowHeight;
      const scrollRange = scrollEnd - scrollStart;

      let progress = 0;
      if (scrollRange > 0) {
        progress = clamp((window.pageYOffset - scrollStart) / scrollRange, 0, 1);
      } else {
        progress = 1;
      }

      const reveal = 30 - progress * 30;
      const parallaxY = -120 + progress * 190;

      hero.style.setProperty("--pycha-reveal", `${reveal.toFixed(2)}%`);
      hero.style.setProperty("--pycha-parallax-y", `${parallaxY.toFixed(2)}px`);

      ticking = false;
    };

    const onScroll = () => {
      if (!ticking) {
        window.requestAnimationFrame(updateParallax);
        ticking = true;
      }
    };

    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);

    updateParallax();
  })();

            delay: s,
            scrollTrigger: { trigger: t, start: "top 85%" },
          }))
      : ("top" == e &&
          gsap.from(t, { y: -i, opacity: 0, ease: g, duration: o, delay: s }),
        "left" == e &&
          gsap.from(t, { x: -i, opacity: 0, ease: g, duration: o, delay: s }),
        "bottom" == e &&
          gsap.from(t, { y: i, opacity: 0, ease: g, duration: o, delay: s }),
        "right" == e &&
          gsap.from(t, { x: i, opacity: 0, ease: g, duration: o, delay: s }),
        "in" == e &&
          gsap.from(t, { opacity: 0, ease: g, duration: o, delay: s }));
});


      //////////////////////////// video-Animation //////////////////////////////////////////  
  
  
  
document.querySelectorAll(".video-box").forEach(box => {
  const btn = box.querySelector(".video-play-btn");

  // Show button on hover
  box.addEventListener("mouseenter", () => {
    gsap.to(btn, {
      opacity: 1,
      scale: 1,
      duration: 0.4,
      ease: "back.out(1.7)"
    });
  });

  // Move button with cursor
  box.addEventListener("mousemove", (e) => {
    const rect = box.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    gsap.to(btn, {
      x: x * 0.25,
      y: y * 0.25,
      duration: 0.4,
      ease: "power3.out"
    });
  });

  // Hide button on hover out
  box.addEventListener("mouseleave", () => {
    gsap.to(btn, {
      opacity: 0,
      scale: 0.5,
      x: 0,
      y: 0,
      duration: 0.5,
      ease: "back.in(1.5)"
    });
  });
});
  

  

  
  
  
          ////////////////////////////Image-Move ///////////////////////////////////// 
const parentBox = document.querySelector('.parent-box');
const movers = Array.from(parentBox.querySelectorAll('.child-image'));

// Apply essential styles
Object.assign(parentBox.style, {
  position: 'relative',
  overflow: 'hidden',
  width: '100vw',
  height: '100vh'
});

movers.forEach(el => {
  Object.assign(el.style, {
    position: 'absolute',
 
    height: 'auto'
  });
});

// Random start position inside parent
function setRandomStart(el) {
  const elWidth = el.offsetWidth;
  const elHeight = el.offsetHeight;
  const parentWidth = parentBox.clientWidth;
  const parentHeight = parentBox.clientHeight;

  const startX = Math.random() * (parentWidth - elWidth);
  const startY = Math.random() * (parentHeight - elHeight);

  gsap.set(el, { x: startX, y: startY });
}

// Animate each image
function animateRandomly(el) {
  const elWidth = el.offsetWidth;
  const elHeight = el.offsetHeight;
  const parentWidth = parentBox.clientWidth;
  const parentHeight = parentBox.clientHeight;

  const minX = 0;
  const maxX = parentWidth - elWidth;
  const minY = 0;
  const maxY = parentHeight - elHeight;

  const newX = Math.random() * (maxX - minX) + minX;
  const newY = Math.random() * (maxY - minY) + minY;

  gsap.to(el, {
    duration: 8 + Math.random() * 6, // slow floating
    x: newX,
    y: newY,
    ease: 'power1.inOut',
    onComplete: () => animateRandomly(el)
  });
}

// Start animations with random positions
movers.forEach(el => {
  setRandomStart(el);
  animateRandomly(el);
});

// Re-run on resize
window.addEventListener('resize', () => {
  movers.forEach(el => {
    gsap.killTweensOf(el);
    setRandomStart(el);
    animateRandomly(el);
  });
});
